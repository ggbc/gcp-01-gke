apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: southamerica-east1-docker.pkg.dev/allianceit-gke-lab/allianceit-images/api-gateway:v1
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: ORDERS_HOST
              value: "orders-service"
            - name: ORDERS_PORT
              value: "3001"
            - name: INVENTORY_HOST
              value: "inventory-service"
            - name: INVENTORY_PORT
              value: "3002"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer